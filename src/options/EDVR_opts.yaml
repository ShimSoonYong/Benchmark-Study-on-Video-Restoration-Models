# general settings
name: TRAIN_OPS
data_dim: 3
resume: -1 #  -1: start from scratch, 0: resume from the latest checkpoint, 1: resume from best checkpoint
# data settings
datasets:
  train:
    name: EDVR_train
    type: GOPRO_Large
    gt_dir: /workspace/GOPRO_Large/train/*/sharp
    input_dir: /workspace/GOPRO_Large/train/*/blur
    repeat: 160
    crop_size: 256 # Setting of the original paper. 
    frame_crop_size: 5
    augment: true

    # data loader settings
    batch_size: 16
    num_workers: 4

  val:
    gt_dir: /workspace/GOPRO_Large/test/*/sharp
    input_dir: /workspace/GOPRO_Large/test/*/blur
    repeat: 1
    batch_size: 1
    num_workers: 4
    crop_size: 256
    frame_crop_size: 5
  
  test:
    gt_dir: /workspace/GOPRO_Large/test/*/sharp
    input_dir: /workspace/GOPRO_Large/test/*/blur
    repeat: 1
    batch_size: 1
    num_workers: 4
    crop_size: 256
    frame_crop_size: 5
    
model:
  type: EDVR
  debug: true 
  predeblur: true
  HR_in: true

# training settings
train:
  details:
    epochs: 1000
    warmup_iter: -1 # no warm up
    use_grad_clip: true
    grad_norm: !!float 0.01
    AMP: true

  # Split 300k iterations into two cycles. 
  # 1st cycle: fixed 3e-4 LR for 92k iters. 
  # 2nd cycle: cosine annealing (3e-4 to 1e-6) for 208k iters.
  scheduler:
    type: MultiStepLR
    milestones: [120, 180, 240, 270]
    gamma: 0.5



  optimizer:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.999]   
  

  # losses
  pixel_opt:
    type: IPLoss
    # loss앞에 곱해지는 weight값
    loss_weight: 1
    # output의 sum을 할지, mean을 할지, none을 할지(이러면 아마도 batch 개수만큼의 값을 가진 vector로 return되는 듯?)
    reduction: mean

# test settings
test:
  save_img: false
  test_every: 100
  metrics: [RMSE, PSNR]
  crop: true
  tile: [5, 256, 256]
  tile_overlap: [0, 10, 0]